<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>EUR USD OTC Signal Bot</title>

<style>
body{
background:#111827;
color:white;
font-family:Arial,sans-serif;
text-align:center;
padding:20px;
}

.box{
background:#1f2937;
padding:15px;
border-radius:15px;
margin:15px auto;
max-width:350px;
}

button{
background:#16a34a;
color:white;
padding:15px 30px;
font-size:20px;
border:none;
border-radius:12px;
cursor:pointer;
}

#time{
font-size:30px;
font-weight:bold;
}

#countdown{
font-size:24px;
color:yellow;
}

#result{
font-size:40px;
font-weight:bold;
margin-top:20px;
}
</style>

</head>

<body>

<h1>🤖 EUR/USD OTC Signal Bot</h1>

<div class="box">
<div id="time"></div>
</div>

<div class="box">
<div id="countdown">Next Signal: 60</div>
</div>

<div class="box">
<button onclick="signal()">Generate Signal</button>

<div id="result">Waiting...</div>
</div>

<script>

function clock(){
let d=new Date();
document.getElementById("time").innerHTML=d.toLocaleTimeString();
}
setInterval(clock,1000);
clock();

let count=60;

setInterval(function(){

count--;

if(count<0){
count=60;
}

document.getElementById("countdown").innerHTML="Next Signal: "+count;

},1000);

function signal(){
let s=Math.random()>0.5?"🟢 UP":"🔴 DOWN";

document.getElementById("result").innerHTML=s;

}

</script>

</body>
</html>
