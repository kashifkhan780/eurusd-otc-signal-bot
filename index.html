<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EUR/USD OTC Signal Bot</title>

<style>
body{
background:#111827;
color:white;
font-family:Arial,sans-serif;
text-align:center;
margin:0;
padding:20px;
}

.box{
background:#1f2937;
padding:15px;
margin:15px auto;
border-radius:15px;
max-width:350px;
}

h1{
font-size:28px;
}

#time{
font-size:28px;
font-weight:bold;
}

#countdown{
font-size:24px;
color:yellow;
}

#result{
font-size:40px;
font-weight:bold;
margin-top:15px;
}

button{
background:#16a34a;
color:white;
font-size:20px;
padding:15px;
width:100%;
border:none;
border-radius:10px;
}

</style>
</head>

<body>

<h1>🤖 EUR/USD OTC Signal Bot</h1>

<div class="box">
<div id="time"></div>
</div>

<div class="box">
<div id="countdown">Next Signal: 60</div>
</div><div class="box">

<button onclick="signal()">
Generate Signal
</button>

<div id="result">
Waiting...
</div>

</div>

<script>

function clock(){
let d=new Date();
document.getElementById("time").innerHTML=d.toLocaleTimeString();
}

setInterval(clock,1000);
clock();

let count=60;

setInterval(function(){

count--;

if(count<0){
count=60;
}
document.querySelector("button").disabled=(count!==0);
document.getElementById("countdown").innerHTML=
"Next Signal: "+count;

},1000);

function signal(){
if(count!==0){
alert("0 سیکنڈ کا انتظار کریں");
return;
}
// 5 سیکنڈ تک انتظار
document.getElementById("btn").disabled = true;
document.getElementById("countdown").innerHTML = "Analyzing...";

setTimeout(function () {

    // یہاں بعد میں UP یا DOWN کا سگنل آئے گا

}, 5000);
let s=Math.random()>0.5 ? "🟢 UP" : "🔴 DOWN";

document.getElementById("result").innerHTML=s;

}</script>

</body>
</html>
