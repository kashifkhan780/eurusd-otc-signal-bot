<!DOCTYPE html>
<html>
<head>
<title>EUR USD OTC Signal Bot</title>
<style>
body{
  font-family:Arial;
  text-align:center;
  background:#111;
  color:white;
}
button{
  padding:15px 30px;
  font-size:20px;
  background:green;
  color:white;
  border:none;
  border-radius:10px;
}
#time{
  font-size:24px;
  margin:20px;
}
#result{
  font-size:35px;
  margin-top:20px;
}
</style>
</head>

<body>

<h1>EUR USD OTC Signal Bot</h1>

<div id="time"></div>

<button onclick="signal()">Generate Signal</button>

<div id="result">Waiting...</div>
  <div id="countdown">Next Signal In: 60</div>

<script>

function clock(){
let d=new Date();
document.getElementById("time").innerHTML=d.toLocaleTimeString();
}
setInterval(clock,1000);
  
clock();let count = 60;

setInterval(function(){
  count--;

  if(count < 0){
    count = 60;
  }

  document.getElementById("countdown").innerHTML =
    "Next Signal In: " + count;
},1000);

function signal(){
let s=Math.random()>0.5?"🟢 UP":"🔴 DOWN";
document.getElementById("result").innerHTML=s;
}

</script>

</body>
</html>
